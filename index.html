<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu de Tarefas</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box;}
    body {font-family: Arial, sans-serif; background:#f0f4f8; color:#333; display:flex; flex-direction:column; align-items:center; padding:40px 20px;}
    h1 {color:#2a2a72; font-size:2.5rem; margin-bottom:10px; text-align:center;}
    p.info {font-size:1.2rem; margin-bottom:30px; text-align:center;}
    .trimestre {display:flex; flex-direction:column; gap:20px; width:100%; max-width:600px;}
    .card {background:#ffffff; border-radius:15px; padding:20px; text-align:center; box-shadow:0 6px 12px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s;}
    .card:hover {transform: translateY(-5px); box-shadow:0 10px 20px rgba(0,0,0,0.15);}
    .card a {text-decoration:none; color:#2a2a72; font-weight:bold; font-size:1.3rem;}
  </style>
</head>
<body>
  <h1>Félix Manuel Filipe</h1>
  <p class="info">Número: 15 | Sala: 18 | Turma: BNI</p>
  <div class="trimestre">
    <div class="card"><a href="I-trimestre.html">Iº Trimestre</a></div>
    <div class="card"><a href="II-trimestre.html">IIº Trimestre</a></div>
    <div class="card"><a href="III-trimestre.html">IIIº Trimestre</a></div>
  </div>
</body>
</html>
